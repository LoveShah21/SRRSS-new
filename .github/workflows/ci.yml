name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./backend
        run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/srrss-test
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test

  # AI Service Tests
  ai-service-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        working-directory: ./ai-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI service tests
        working-directory: ./ai-service
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test
        env:
          CI: true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # Build Docker images
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, ai-service-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        working-directory: ./backend
        run: docker build -t srrss-backend:latest .

      - name: Build AI service Docker image
        working-directory: ./ai-service
        run: docker build -t srrss-ai-service:latest .

      - name: Build frontend Docker image
        working-directory: ./frontend
        run: docker build -t srrss-frontend:latest .

  # Lint
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend lint tools
        working-directory: ./backend
        run: npm ci

      - name: Install AI service lint tools
        working-directory: ./ai-service
        run: |
          pip install --upgrade pip
          pip install flake8 black

      - name: Run backend lint
        working-directory: ./backend
        run: npx eslint . --ext .js 2>/dev/null || echo "No ESLint configured, skipping..."

      - name: Run Python lint
        working-directory: ./ai-service
        run: |
          TARGETS=""
          [ -f app.py ] && TARGETS="$TARGETS app.py"
          [ -d models ] && TARGETS="$TARGETS models"
          [ -d tests ] && TARGETS="$TARGETS tests"
          [ -z "$TARGETS" ] && TARGETS="."
          flake8 $TARGETS --max-line-length=100 || true
