services:
  - name: srrss-monolith
    type: web
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_NAME
        value: srrss
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_TLS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: AI_SERVICE_HOSTPORT
        value: localhost:8000
      - key: AI_SERVICE_API_KEY
        sync: false
      - key: AI_REQUIRE_API_KEY
        value: "true"
      - key: AI_ALLOWED_ORIGINS
        value: "*"
      - key: AI_TRUSTED_INTERNAL_HOSTS
        value: "localhost,127.0.0.1,::1"
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_ENABLED
        value: "false"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: srrss
      - key: R2_PUBLIC_URL
        sync: false
      - key: CALENDAR_ENABLED
        value: "false"
      - key: SESSION_TTL_SECONDS
        value: "86400"
