version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: srrss-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - srrss-network

  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: srrss-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-srrss_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me-in-env}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-srrss}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - srrss-network

  # Backend API (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: srrss-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-srrss_admin}:${MONGO_INITDB_ROOT_PASSWORD:-change-me-in-env}@mongodb:27017/${MONGO_INITDB_DATABASE:-srrss}?authSource=admin
      DB_NAME: srrss
      JWT_SECRET: ${JWT_SECRET:-irfsjkdnfjksdierusfkieruhfasniuersfnv}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-irugsfiuerkfjsdiuerkfdsiuejfsduegfjd}
      JWT_REFRESH_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-ruoiafjslkdioerufsdjkoiruisfjkoiudsfjkcxoiuedsfhjewuoiadsfkouiasfjkdwrouiwesfjkdoiuewrasfkcxiuoerfdcxoruiafdsjk}
      AI_TRUSTED_INTERNAL_HOSTS: ${AI_TRUSTED_INTERNAL_HOSTS:-localhost,127.0.0.1,::1,ai-service}
      UPLOAD_DIR: /app/uploads
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - ai-service
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - srrss-network

  # AI Service (Python)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: srrss-ai-service
    restart: unless-stopped
    environment:
      PORT: 8000
      PYTHONUNBUFFERED: 1
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-ruoiafjslkdioerufsdjkoiruisfjkoiudsfjkcxoiuedsfhjewuoiadsfkouiasfjkdwrouiwesfjkdoiuewrasfkcxiuoerfdcxoruiafdsjk}
      AI_REQUIRE_API_KEY: ${AI_REQUIRE_API_KEY:-true}
      AI_ALLOWED_ORIGINS: ${AI_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4173,http://localhost:5000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-86400}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ai_uploads:/app/uploads
    networks:
      - srrss-network

  # Frontend (optional - can run locally during dev)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: srrss-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - srrss-network

networks:
  srrss-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local
  ai_uploads:
    driver: local
  redis_data:
    driver: local
